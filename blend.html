<!DOCTYPE html>
<html>
<head>
  <title>Blended View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #frame1 {
      z-index: 1;
      opacity: 1;
      pointer-events: auto;
    }

    #frame2 {
      z-index: 2;
      opacity: 0.4;
      pointer-events: none;
    }

    iframe.darkened {
      filter: invert(0.88) hue-rotate(180deg);
    }

    /* Hover zone at bottom center */
    #bar-zone {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 70px;
      z-index: 99998;
      pointer-events: auto;
    }

    #bar {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      background: rgba(10, 10, 24, 0.94);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 10px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 13px;
      color: #ccc;
      user-select: none;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #bar-zone:hover #bar {
      opacity: 1;
      pointer-events: auto;
    }

    /* Active site dot */
    #dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #667eea;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #dot.site2 { background: #c084fc; }

    #label { font-weight: 600; font-size: 12px; }

    /* Percentage slider */
    .slider-group {
      display: flex;
      align-items: center;
      gap: 5px;
      pointer-events: auto;
    }

    .pct-num {
      font-size: 11px;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
    }
    .pct-1 { color: #667eea; }
    .pct-2 { color: #c084fc; }

    #blend-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #667eea, #c084fc);
      outline: none;
      cursor: pointer;
    }

    #blend-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #667eea;
      cursor: pointer;
    }

    /* Buttons */
    .bar-btn {
      border: none;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      pointer-events: auto;
      transition: opacity 0.15s;
    }
    .bar-btn:hover { opacity: 0.8; }

    #swap-btn { background: linear-gradient(135deg, #667eea, #764ba2); }

    /* Dark mode select */
    #dark-select {
      pointer-events: auto;
      background: #2a2a4a;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 5px;
      padding: 4px 6px;
      font-size: 11px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="container">
    <iframe id="frame1" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <iframe id="frame2" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>

  <div id="bar-zone">
    <div id="bar">
      <span id="dot"></span>
      <span id="label">Site 1</span>

      <div class="slider-group">
        <span class="pct-num pct-1" id="pct1">60%</span>
        <input type="range" id="blend-slider" min="0" max="100" value="60">
        <span class="pct-num pct-2" id="pct2">40%</span>
      </div>

      <button class="bar-btn" id="swap-btn">Swap</button>

      <select id="dark-select">
        <option value="none">Dark: Off</option>
        <option value="1">Dark: Site 1</option>
        <option value="2">Dark: Site 2</option>
      </select>
    </div>
  </div>

  <script src="blend.js"></script>
</body>
</html>
