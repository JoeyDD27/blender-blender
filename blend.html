<!DOCTYPE html>
<html>
<head>
  <title>Blended View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Default: site1 active (bottom, interactive), site2 overlay on top */
    #frame1 {
      z-index: 1;
      opacity: 1;
      pointer-events: auto;
    }

    #frame2 {
      z-index: 2;
      opacity: 0.4;
      pointer-events: none;
    }

    #indicator-zone {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 80px;
      z-index: 99998;
      pointer-events: auto;
    }

    #indicator {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      background: rgba(12, 12, 28, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 126, 234, 0.35);
      border-radius: 10px;
      padding: 7px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 13px;
      color: #ccc;
      user-select: none;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
    }

    #indicator-zone:hover #indicator {
      opacity: 1;
      pointer-events: auto;
    }

    #dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #667eea;
      transition: background 0.25s;
    }

    #dot.site2 { background: #c084fc; }

    #label { font-weight: 600; }

    .bar-btn {
      border: none;
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      pointer-events: auto;
      transition: opacity 0.2s;
    }

    .bar-btn:hover { opacity: 0.8; }

    #swap-btn { background: linear-gradient(135deg, #667eea, #764ba2); }

    #dark-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); }
    #dark-btn.active { background: rgba(102, 126, 234, 0.4); border-color: #667eea; }

    iframe.darkened {
      filter: invert(0.88) hue-rotate(180deg);
    }
  </style>
</head>
<body>
  <div id="container">
    <iframe id="frame1" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <iframe id="frame2" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>

  <div id="indicator-zone">
    <div id="indicator">
      <span id="dot"></span>
      <span id="label">Using: Site 1 (60%)</span>
      <button class="bar-btn" id="swap-btn">Swap</button>
      <select id="dark-select" style="pointer-events:auto; background:#2a2a4a; color:#ccc; border:1px solid #444; border-radius:5px; padding:3px 6px; font-size:11px; cursor:pointer;">
        <option value="none">Dark Mode: Off</option>
        <option value="1">Dark: Site 1</option>
        <option value="2">Dark: Site 2</option>
      </select>
    </div>
  </div>

  <script src="blend.js"></script>
</body>
</html>
